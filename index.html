<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveNear — Montreal Music Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">🎵 LiveNear</div>
      <div class="header-sub">Montreal Music Taste Map — Find where to perform</div>
    </div>
  </header>

  <div class="tabs-bar">
    <div id="genreTabs" class="genre-tabs"></div>
  </div>

  <main>

    <!-- LEFT: Neighbourhood list -->
    <aside class="sidebar left-sidebar">
      <div class="sidebar-title">
        <span>🗺 Neighbourhoods</span>
        <span class="sidebar-hint">Click to explore</span>
      </div>
      <div id="hoodList" class="hood-list"></div>
      <div class="legend-box">
        <div class="legend-title">Genre Colours</div>
        <div id="genreLegend" class="legend-grid"></div>
      </div>
    </aside>

    <!-- CENTER: Map -->
    <section class="map-section">
      <div id="map"></div>
      <div id="neighbourhoodDetail" class="neighbourhood-detail"></div>
    </section>

    <!-- RIGHT: Create event + Event list -->
    <aside class="sidebar right-sidebar">

      <div class="panel create-panel">
        <div class="panel-title">🎤 Create Performance</div>
        <div id="formError" class="form-error"></div>
        <input id="artistName" type="text" placeholder="Artist name *" />
        <input id="genre" type="text" placeholder="Genre: Jazz/Blues, Hip-Hop, Rock…" />
        <select id="neighbourhoodSelect"></select>
        <input id="locationName" type="text" placeholder="Venue / street name (geocoded) *" />
        <input id="time" type="text" placeholder="Time: Today 6 PM *" />
        <input id="liveLink" type="text" placeholder="Livestream link (optional)" />
        <button class="create-btn" onclick="createEvent()">Create Event</button>
        <p class="hint">The venue name is geocoded — enter a real Montreal address or place name for an exact pin.</p>
      </div>

      <div id="eventsPanel" class="panel events-panel">
        <div class="panel-title">
          <span id="eventsTitle">Live Events</span>
          <button id="clearFilter" class="clear-filter-btn" style="display:none" onclick="clearEventFilter()">✕ All areas</button>
        </div>
        <div id="eventList"></div>
      </div>

    </aside>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
